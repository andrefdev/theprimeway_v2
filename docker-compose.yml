services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: theprimeway
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: theprimeway_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
