# Nginx configuration for serving Vite SPA from inside Docker containers
# Used by web and admin containers (internal, port 80)
# The reverse proxy (theprimeway.conf) routes traffic to these containers

server {
    listen 80 default_server;

    # Serve static files from Vite build output
    root /usr/share/nginx/html;
    index index.html;

    # Vite generates hashed asset filenames: assets/index-BxRz1234.js
    # These are immutable, so cache them forever (1 year)
    location ~* "/assets/.*\.[0-9a-f]{8,}\.(js|css|woff2?|png|jpg|svg|ico)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must NEVER be cached
    # Clients must always fetch the latest to get new asset URLs
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA client-side routing fallback
    # All unknown paths serve index.html, which loads the React Router app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression for assets (already optimized by Vite, but helps)
    gzip on;
    gzip_types text/css application/javascript application/json;
}
