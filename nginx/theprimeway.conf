# /etc/nginx/sites-available/theprimeway.conf
# Symlink: ln -s /etc/nginx/sites-available/theprimeway.conf /etc/nginx/sites-enabled/
#
# SSL is managed by Certbot. After initial HTTP setup run:
#   sudo certbot --nginx -d api.theprimeway.app -d app.theprimeway.app -d admin.theprimeway.app
# Certbot will inject the ssl_certificate / ssl_certificate_key / ssl_protocols
# / ssl_ciphers directives and replace the HTTP redirects automatically.

# ─── Gzip ──────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

# ─── api.theprimeway.app ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.theprimeway.app;

    # Certbot will add SSL block here
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/api.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.theprimeway.app/privkey.pem;

    # Redirect HTTP → HTTPS (Certbot replaces this block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.theprimeway.app;

    # SSL — managed by Certbot, placeholders only:
    # ssl_certificate     /etc/letsencrypt/live/api.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.theprimeway.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'none'; frame-ancestors 'none';"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Hono supports it)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings — disable buffering for SSE/streaming endpoints
        proxy_buffering    off;
    }
}

# ─── app.theprimeway.app (Web SPA) ────────────────────────────────────────────
server {
    listen 80;
    server_name app.theprimeway.app;

    # Certbot will add SSL block here
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.theprimeway.app;

    # SSL — managed by Certbot:
    # ssl_certificate     /etc/letsencrypt/live/app.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.theprimeway.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/theprimeway/web;
    index index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Vite hashed assets — cache aggressively (1 year)
    # Vite generates filenames like: assets/index-BxRz1234.js
    location ~* /assets/.*\.[0-9a-f]{8,}\.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — must never be cached so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # SPA fallback — all unknown paths serve index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── admin.theprimeway.app (Admin SPA) ────────────────────────────────────────
server {
    listen 80;
    server_name admin.theprimeway.app;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.theprimeway.app;

    # SSL — managed by Certbot:
    # ssl_certificate     /etc/letsencrypt/live/admin.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/admin.theprimeway.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/theprimeway/admin;
    index index.html;

    # Security headers (tighter for admin panel)
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Restrict admin to known IP ranges if desired — add allow/deny here:
    # allow 1.2.3.4;
    # deny  all;

    location ~* /assets/.*\.[0-9a-f]{8,}\.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
