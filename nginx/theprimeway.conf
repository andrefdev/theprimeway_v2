# Nginx reverse proxy configuration for ThePrimeWay (Docker Compose)
# Mounted at /etc/nginx/conf.d/default.conf in the nginx container
# Routes traffic to backend services via Docker internal network
#
# SSL certificates are mounted from host at /etc/letsencrypt (managed by Certbot on host)
# Certbot webroot challenge directory mounted at /var/www/certbot

# ─── Gzip ──────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

# ─── api.theprimeway.app ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.theprimeway.app;

    # Certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.theprimeway.app;

    ssl_certificate     /etc/letsencrypt/live/api.theprimeway.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.theprimeway.app/privkey.pem;

    # Security headers
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'none'; frame-ancestors 'none';"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for SSE/streaming
        proxy_buffering    off;
    }
}

# ─── app.theprimeway.app (Web SPA) ────────────────────────────────────────────
server {
    listen 80;
    server_name app.theprimeway.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.theprimeway.app;

    ssl_certificate     /etc/letsencrypt/live/app.theprimeway.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.theprimeway.app/privkey.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://web:80;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── admin.theprimeway.app (Admin SPA) ────────────────────────────────────────
server {
    listen 80;
    server_name admin.theprimeway.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name admin.theprimeway.app;

    ssl_certificate     /etc/letsencrypt/live/admin.theprimeway.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.theprimeway.app/privkey.pem;

    # Security headers (tighter for admin panel)
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
