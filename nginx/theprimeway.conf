# Nginx reverse proxy configuration for ThePrimeWay (Docker Compose)
# Mounted at /etc/nginx/conf.d/default.conf in the nginx container
# Routes traffic to backend services via Docker internal network
#
# SSL certificates are mounted from host at /etc/letsencrypt (managed by Certbot on host)
# Certbot webroot challenge directory mounted at /var/www/certbot
#
# Service upstreams (via Docker internal network):
#   - api:3001      → Hono API server
#   - web:80        → Web SPA (nginx serving Vite dist)
#   - admin:80      → Admin SPA (nginx serving Vite dist)

# ─── Gzip ──────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

# ─── api.theprimeway.app ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.theprimeway.app;

    # Certbot will add SSL block here
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/api.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.theprimeway.app/privkey.pem;

    # Redirect HTTP → HTTPS (Certbot replaces this block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.theprimeway.app;

    # SSL — managed by Certbot, placeholders only:
    # ssl_certificate     /etc/letsencrypt/live/api.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.theprimeway.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'none'; frame-ancestors 'none';"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Certbot HTTP-01 challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Hono supports it)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings — disable buffering for SSE/streaming endpoints
        proxy_buffering    off;
    }
}

# ─── app.theprimeway.app (Web SPA) ────────────────────────────────────────────
server {
    listen 80;
    server_name app.theprimeway.app;

    # Certbot will add SSL block here
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.theprimeway.app;

    # SSL — managed by Certbot:
    # ssl_certificate     /etc/letsencrypt/live/app.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.theprimeway.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Certbot HTTP-01 challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to web SPA container (nginx serving Vite dist)
    location / {
        proxy_pass         http://web:80;
        proxy_http_version 1.1;

        # Forward request details for proper routing
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── admin.theprimeway.app (Admin SPA) ────────────────────────────────────────
server {
    listen 80;
    server_name admin.theprimeway.app;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.theprimeway.app;

    # SSL — managed by Certbot:
    # ssl_certificate     /etc/letsencrypt/live/admin.theprimeway.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/admin.theprimeway.app/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (tighter for admin panel)
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Restrict admin to known IP ranges if desired — add allow/deny here:
    # allow 1.2.3.4;
    # deny  all;

    # Certbot HTTP-01 challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to admin SPA container (nginx serving Vite dist)
    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;

        # Forward request details for proper routing
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
