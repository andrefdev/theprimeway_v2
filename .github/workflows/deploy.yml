name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Change Detection ────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/config-ts/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'nginx/spa.conf'
            admin:
              - 'apps/admin/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'nginx/spa.conf'
            docs:
              - 'apps/docs/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'nginx/**'
              - '.github/workflows/deploy.yml'

  # ─── Validate Prisma Schema/Migrations Sync ─────────────────────────────────
  # Catches the case where schema.prisma was edited but no matching migration
  # was generated and committed (the API would build with a Prisma Client that
  # references columns the database doesn't have, exploding at runtime).
  validate-prisma:
    name: Validate Prisma
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install API dependencies
        run: pnpm install --frozen-lockfile --filter @repo/api...

      - name: Verify schema matches migrations
        working-directory: apps/api
        # DATABASE_URL is required by prisma.config.ts at module load (env() is
        # eager). migrate diff itself does not use it — the shadow DB is given
        # explicitly via --shadow-database-url — but the config must load first.
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow
        run: |
          pnpm exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "postgresql://postgres:postgres@localhost:5432/shadow" \
            --exit-code || {
              echo "::error::schema.prisma diverges from prisma/migrations/. Run 'pnpm --filter @repo/api db:migrate:new <name>' locally and commit the new migration."
              exit 1
            }

  # ─── Build & Push API Docker Image ──────────────────────────────────────────
  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-api:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build & Push Web Docker Image ──────────────────────────────────────────
  build-web:
    name: Build Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-web:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-web:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_APPLE_CLIENT_ID=${{ secrets.VITE_APPLE_CLIENT_ID }}
            VITE_APPLE_REDIRECT_URI=${{ secrets.VITE_APPLE_REDIRECT_URI }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Validate Mintlify Docs ─────────────────────────────────────────────────
  # Mintlify hosted (dashboard.mintlify.com) auto-rebuilds the site from
  # apps/docs/ on each push to main. This job only validates that the docs
  # config and links are healthy before Mintlify picks them up.
  validate-docs:
    name: Validate Docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate docs.json schema and check broken links
        working-directory: apps/docs
        run: |
          npx --yes mint@latest broken-links

  # ─── Build & Push Admin Docker Image ────────────────────────────────────────
  build-admin:
    name: Build Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-admin:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-admin:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_APPLE_CLIENT_ID=${{ secrets.VITE_APPLE_CLIENT_ID }}
            VITE_APPLE_REDIRECT_URI=${{ secrets.VITE_APPLE_REDIRECT_URI }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Deploy to Server via Docker Compose ────────────────────────────────────
  deploy:
    name: Deploy
    needs: [changes, validate-prisma, build-api, build-web, build-admin, validate-docs]
    # Run if: always() means run regardless of job statuses
    # !cancelled() means don't run if cancelled
    # !contains(needs.*.result, 'failure') means don't run if any job failed
    # At least one build job must have run and not been skipped
    if: |
      always() && !cancelled() && !contains(needs.*.result, 'failure') &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.api == 'true' ||
       needs.changes.outputs.web == 'true' ||
       needs.changes.outputs.admin == 'true' ||
       needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Generate .env for the API container from GitHub Secrets
      # These are injected into the api container via docker-compose env_file directive
      - name: Generate .env for docker-compose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRY: ${{ secrets.JWT_ACCESS_EXPIRY }}
          JWT_REFRESH_EXPIRY: ${{ secrets.JWT_REFRESH_EXPIRY }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          GOOGLE_CALENDAR_REDIRECT_URI: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
          AUTH_APPLE_ID: ${{ secrets.AUTH_APPLE_ID }}
          AUTH_APPLE_SECRET: ${{ secrets.AUTH_APPLE_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          LEMON_SQUEEZY_API_KEY: ${{ secrets.LEMON_SQUEEZY_API_KEY }}
          LEMON_SQUEEZY_STORE_ID: ${{ secrets.LEMON_SQUEEZY_STORE_ID }}
          LEMON_SQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY_RAW: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          # Build .env with printf — single quotes prevent special char issues
          # (angle brackets in SMTP_FROM, passwords with symbols, etc.)
          : > .env
          printf "DOCKER_REGISTRY='%s'\n" "${{ github.repository_owner }}" >> .env
          printf "NODE_ENV='production'\n" >> .env
          printf "PORT='3001'\n" >> .env
          printf "DATABASE_URL='%s'\n" "$DATABASE_URL" >> .env
          printf "DIRECT_DATABASE_URL='%s'\n" "$DIRECT_DATABASE_URL" >> .env
          printf "JWT_SECRET='%s'\n" "$JWT_SECRET" >> .env
          printf "JWT_ACCESS_EXPIRY='%s'\n" "$JWT_ACCESS_EXPIRY" >> .env
          printf "JWT_REFRESH_EXPIRY='%s'\n" "$JWT_REFRESH_EXPIRY" >> .env
          printf "AUTH_GOOGLE_ID='%s'\n" "$AUTH_GOOGLE_ID" >> .env
          printf "AUTH_GOOGLE_SECRET='%s'\n" "$AUTH_GOOGLE_SECRET" >> .env
          printf "GOOGLE_CALENDAR_REDIRECT_URI='%s'\n" "$GOOGLE_CALENDAR_REDIRECT_URI" >> .env
          printf "AUTH_APPLE_ID='%s'\n" "$AUTH_APPLE_ID" >> .env
          printf "AUTH_APPLE_SECRET='%s'\n" "$AUTH_APPLE_SECRET" >> .env
          printf "ANTHROPIC_API_KEY='%s'\n" "$ANTHROPIC_API_KEY" >> .env
          printf "DEEPSEEK_API_KEY='%s'\n" "$DEEPSEEK_API_KEY" >> .env
          printf "SMTP_HOST='%s'\n" "$SMTP_HOST" >> .env
          printf "SMTP_PORT='%s'\n" "$SMTP_PORT" >> .env
          printf "SMTP_USER='%s'\n" "$SMTP_USER" >> .env
          printf "SMTP_PASS='%s'\n" "$SMTP_PASS" >> .env
          printf "SMTP_FROM='%s'\n" "$SMTP_FROM" >> .env
          printf "LEMON_SQUEEZY_API_KEY='%s'\n" "$LEMON_SQUEEZY_API_KEY" >> .env
          printf "LEMON_SQUEEZY_STORE_ID='%s'\n" "$LEMON_SQUEEZY_STORE_ID" >> .env
          printf "LEMON_SQUEEZY_WEBHOOK_SECRET='%s'\n" "$LEMON_SQUEEZY_WEBHOOK_SECRET" >> .env
          printf "FIREBASE_PROJECT_ID='%s'\n" "$FIREBASE_PROJECT_ID" >> .env
          printf "FIREBASE_CLIENT_EMAIL='%s'\n" "$FIREBASE_CLIENT_EMAIL" >> .env
          printf "CLOUDINARY_CLOUD_NAME='%s'\n" "$CLOUDINARY_CLOUD_NAME" >> .env
          printf "CLOUDINARY_UPLOAD_PRESET='%s'\n" "$CLOUDINARY_UPLOAD_PRESET" >> .env
          printf "RAPIDAPI_KEY='%s'\n" "$RAPIDAPI_KEY" >> .env
          printf "SENTRY_DSN='%s'\n" "$SENTRY_DSN" >> .env
          printf "CRON_SECRET='%s'\n" "$CRON_SECRET" >> .env
          printf "ADMIN_API_KEY='%s'\n" "$ADMIN_API_KEY" >> .env

          # FIREBASE_PRIVATE_KEY: expand \n escapes, wrap in double quotes for multiline
          FIREBASE_PRIVATE_KEY_EXPANDED=$(printf '%b' "$FIREBASE_PRIVATE_KEY_RAW")
          printf 'FIREBASE_PRIVATE_KEY="%s"\n' "$FIREBASE_PRIVATE_KEY_EXPANDED" >> .env

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} \
            >> ~/.ssh/known_hosts

      - name: Ensure server directories exist
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'mkdir -p /var/www/theprimeway/nginx /var/www/theprimeway/scripts'

      - name: Copy config files to server
        run: |
          scp -P ${{ secrets.SSH_PORT }} .env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/theprimeway/.env

          scp -P ${{ secrets.SSH_PORT }} docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/theprimeway/docker-compose.prod.yml

          scp -P ${{ secrets.SSH_PORT }} nginx/theprimeway.conf nginx/spa.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/theprimeway/nginx/

          scp -P ${{ secrets.SSH_PORT }} scripts/install-cron.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/theprimeway/scripts/install-cron.sh

      - name: Pull latest images and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd /var/www/theprimeway

            # DOCKER_REGISTRY is in .env for docker-compose variable substitution
            # (persists across manual restarts / server reboots)

            # Pull latest images from GHCR (--ignore-buildable avoids failures for missing images)
            docker compose -f docker-compose.prod.yml pull --ignore-buildable || true

            # Start containers (runs migrations automatically, creates volumes, etc.)
            # If migrate fails, dump its logs before exiting
            docker compose -f docker-compose.prod.yml up -d --remove-orphans || {
              echo "=== migrate container logs ==="
              docker compose -f docker-compose.prod.yml logs migrate
              exit 1
            }

            # Reload nginx so it re-resolves upstream container IPs
            # (api/web/admin containers get new IPs when recreated; long-running
            #  nginx caches stale ones until reload).
            # Validate config first — a bad reload silently leaves stale upstream
            # IPs cached, producing 502s until the next successful reload.
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -t
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload

      - name: Health check - API
        id: health_api
        run: |
          sleep 10
          curl --fail --retry 10 --retry-delay 3 --retry-max-time 60 \
            https://api.theprimeway.app/api/health

      - name: Dump API container state on failure
        if: failure() && steps.health_api.conclusion == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/theprimeway
            echo "=== docker compose ps ==="
            docker compose -f docker-compose.prod.yml ps
            echo "=== api logs (last 200) ==="
            docker compose -f docker-compose.prod.yml logs --tail=200 api || true
            echo "=== nginx logs (last 80) ==="
            docker compose -f docker-compose.prod.yml logs --tail=80 nginx || true

      - name: Health check - Web
        run: |
          sleep 5
          curl --fail --retry 10 --retry-delay 3 --retry-max-time 60 \
            https://app.theprimeway.app

      - name: Health check - Admin
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-max-time 60 \
            https://admin.theprimeway.app

      - name: Health check - Docs
        # Only after nginx has been reloaded with the docs server block.
        # Mintlify hosted serves the content; nginx reverse-proxies it.
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-max-time 60 \
            https://docs.theprimeway.app || echo "::warning::docs.theprimeway.app not yet reachable — verify Mintlify custom domain + DNS + cert"
