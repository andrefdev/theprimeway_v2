name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Change Detection ────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/config-ts/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            admin:
              - 'apps/admin/**'
              - 'packages/shared/**'
              - 'packages/ui/**'

  # ─── Build & Push API Docker Image ──────────────────────────────────────────
  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-api:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build & Push Web Docker Image ──────────────────────────────────────────
  build-web:
    name: Build Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-web:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-web:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_APPLE_CLIENT_ID=${{ secrets.VITE_APPLE_CLIENT_ID }}
            VITE_APPLE_REDIRECT_URI=${{ secrets.VITE_APPLE_REDIRECT_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build & Push Admin Docker Image ────────────────────────────────────────
  build-admin:
    name: Build Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-admin:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/theprimeway-admin:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_APPLE_CLIENT_ID=${{ secrets.VITE_APPLE_CLIENT_ID }}
            VITE_APPLE_REDIRECT_URI=${{ secrets.VITE_APPLE_REDIRECT_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Deploy to Server via Docker Compose ────────────────────────────────────
  deploy:
    name: Deploy
    needs: [changes, build-api, build-web, build-admin]
    # Run if: always() means run regardless of job statuses
    # !cancelled() means don't run if cancelled
    # !contains(needs.*.result, 'failure') means don't run if any job failed
    # At least one build job must have run and not been skipped
    if: |
      always() && !cancelled() && !contains(needs.*.result, 'failure') &&
      (needs.changes.outputs.api == 'true' ||
       needs.changes.outputs.web == 'true' ||
       needs.changes.outputs.admin == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Generate .env for the API container from GitHub Secrets
      # These are injected into the api container via docker-compose env_file directive
      - name: Generate .env for docker-compose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRY: ${{ secrets.JWT_ACCESS_EXPIRY }}
          JWT_REFRESH_EXPIRY: ${{ secrets.JWT_REFRESH_EXPIRY }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_APPLE_ID: ${{ secrets.AUTH_APPLE_ID }}
          AUTH_APPLE_SECRET: ${{ secrets.AUTH_APPLE_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          LEMON_SQUEEZY_API_KEY: ${{ secrets.LEMON_SQUEEZY_API_KEY }}
          LEMON_SQUEEZY_STORE_ID: ${{ secrets.LEMON_SQUEEZY_STORE_ID }}
          LEMON_SQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY_RAW: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          # Expand \n escape sequences in FIREBASE_PRIVATE_KEY
          FIREBASE_PRIVATE_KEY_EXPANDED=$(printf '%b' "$FIREBASE_PRIVATE_KEY_RAW")

          cat > .env <<EOF
          NODE_ENV="production"
          PORT="3001"
          DATABASE_URL="${DATABASE_URL}"
          JWT_SECRET="${JWT_SECRET}"
          JWT_ACCESS_EXPIRY="${JWT_ACCESS_EXPIRY}"
          JWT_REFRESH_EXPIRY="${JWT_REFRESH_EXPIRY}"
          AUTH_GOOGLE_ID="${AUTH_GOOGLE_ID}"
          AUTH_GOOGLE_SECRET="${AUTH_GOOGLE_SECRET}"
          AUTH_APPLE_ID="${AUTH_APPLE_ID}"
          AUTH_APPLE_SECRET="${AUTH_APPLE_SECRET}"
          OPENAI_API_KEY="${OPENAI_API_KEY}"
          SMTP_HOST="${SMTP_HOST}"
          SMTP_PORT="${SMTP_PORT}"
          SMTP_USER="${SMTP_USER}"
          SMTP_PASS="${SMTP_PASS}"
          SMTP_FROM="${SMTP_FROM}"
          LEMON_SQUEEZY_API_KEY="${LEMON_SQUEEZY_API_KEY}"
          LEMON_SQUEEZY_STORE_ID="${LEMON_SQUEEZY_STORE_ID}"
          LEMON_SQUEEZY_WEBHOOK_SECRET="${LEMON_SQUEEZY_WEBHOOK_SECRET}"
          FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}"
          FIREBASE_CLIENT_EMAIL="${FIREBASE_CLIENT_EMAIL}"
          CLOUDINARY_CLOUD_NAME="${CLOUDINARY_CLOUD_NAME}"
          CLOUDINARY_UPLOAD_PRESET="${CLOUDINARY_UPLOAD_PRESET}"
          RAPIDAPI_KEY="${RAPIDAPI_KEY}"
          EOF

          # Append FIREBASE_PRIVATE_KEY separately to preserve real newlines
          printf 'FIREBASE_PRIVATE_KEY="%s"\n' "$FIREBASE_PRIVATE_KEY_EXPANDED" >> .env

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} \
            >> ~/.ssh/known_hosts

      - name: Copy .env and docker-compose to server
        run: |
          scp -P ${{ secrets.SSH_PORT }} .env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/theprimeway/.env

          scp -P ${{ secrets.SSH_PORT }} docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/theprimeway/docker-compose.prod.yml

      - name: Pull latest images and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd /var/www/theprimeway

            # Set DOCKER_REGISTRY for docker-compose variable substitution
            export DOCKER_REGISTRY=${{ github.repository_owner }}

            # Pull latest images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # Start containers (runs migrations automatically, creates volumes, etc.)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Health check - API
        run: |
          sleep 10
          curl --fail --retry 10 --retry-delay 3 --retry-max-time 60 \
            https://api.theprimeway.app/api/health

      - name: Health check - Web
        run: |
          curl --fail --retry 5 --retry-delay 3 \
            https://app.theprimeway.app

      - name: Health check - Admin
        run: |
          curl --fail --retry 5 --retry-delay 3 \
            https://admin.theprimeway.app
